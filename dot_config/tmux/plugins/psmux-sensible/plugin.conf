# =============================================================================
# psmux-sensible - Sensible default settings for psmux
# Static .conf version (source-file compatible)
#
# This file is auto-sourced when psmux sees `set -g @plugin "psmux-sensible"`.
# Place your explicit overrides AFTER the @plugin line in your config.
# =============================================================================

# --- Sensible defaults ---

# Reduce escape-time for faster key recognition
set -g escape-time 50

# Increase scrollback buffer
set -g history-limit 50000

# Enable mouse support
set -g mouse on

# Use vi mode keys in copy mode
set -g mode-keys vi

# Enable focus events (useful for vim/neovim)
set -g focus-events on

# Display messages longer
set -g display-time 2000

# Display pane numbers longer
set -g display-panes-time 2000

# Refresh status bar more frequently
set -g status-interval 5

# Start window numbering at 1
set -g base-index 1

# Start pane numbering at 1
set -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Automatically rename windows based on running command
set -g automatic-rename on

# --- Keybinding improvements ---

# Prefix + R to reload config
bind-key R source-file ~/.psmux.conf \; display-message 'Config reloaded!'

# Better split bindings
bind-key '|' split-window -h
bind-key '-' split-window -v

# Navigate windows with Shift+Arrow (no prefix needed)
bind-key -n S-Left previous-window
bind-key -n S-Right next-window
