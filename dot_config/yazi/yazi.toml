[manager]
show_hidden = true
ratio = [ 1, 3, 4 ]
linemode = "size"

[opener]
edit = [
	{ run = 'notepad++ %*', orphan = true, desc = "Notepad++", for = "windows" },
	{ run = 'notepad %*', orphan = true, desc = "Notepad", for = "windows" },
  { run = 'nvim %*', block = true, desc = "nvim", for = "windows" },
	{ run = 'codium %*', orphan = true, desc = "codium", for = "windows" },
	{ run = 'code %*', orphan = true, desc = "code", for = "windows" },
	{ run = 'open -a TextEdit "$@"', orphan = true, desc = "TextEdit", for = "macos" },
  { run = 'nvim "$@"', desc = "nvim",  block = true, for = "unix" },
  { run = 'notepad.exe "$@"', orphan = true, desc = "notepad", for = "unix" },
	{ run = 'nano "$@"', desc = "nano",  block = true, for = "unix" },
	{ run = 'gnome-text-editor "$@"', orphan = true, desc = "text-editer", for = "unix" },
]
extract = [
	{ run = 'ouch d -y "%*"', desc = "Extract here with ouch", for = "windows" },
	{ run = 'ouch d -y "$@"', desc = "Extract here with ouch", for = "unix" },
]

[plugin]
prepend_previewers = [
	# Archive previewer
	{ mime = "application/*zip",            run = "ouch" },
	{ mime = "application/x-tar",           run = "ouch" },
	{ mime = "application/x-bzip2",         run = "ouch" },
	{ mime = "application/x-7z-compressed", run = "ouch" },
	{ mime = "application/x-rar",           run = "ouch" },
	{ mime = "application/x-xz",            run = "ouch" },
] 
